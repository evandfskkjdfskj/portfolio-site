# 仓库根目录 = portfolio-site 时使用本工作流。
# 推送 main 后：Settings → Pages → Source 选 GitHub Actions。
name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install and build
        run: |
          npm ci
          npm run build
      - name: Verify portrait fallback in dist
        run: |
          test -f dist/index.html
          test -f dist/assets/figma-71/portrait.png
          ls -la dist/assets/figma-71/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
